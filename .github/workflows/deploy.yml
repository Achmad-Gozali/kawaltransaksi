name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/kawaltransaksi/kawaltransaksi
            git pull origin main

            cd backend
            npm install
            npm run build
            pm2 restart kawaltransaksi-backend

            cd ../frontend
            npm install
            npm run build
            pm2 restart kawaltransaksi

            pm2 save
            echo "Deploy selesai"